<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TextHumanize</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="head">
    <span class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="22" height="22" rx="6" fill="url(#thg)"/>
        <path d="M7 8.2h10M12 8.2V17" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="17.4" cy="15.8" r="2.6" fill="#fff" opacity=".9"/>
        <defs><linearGradient id="thg" x1="0" y1="0" x2="24" y2="24">
          <stop stop-color="#6d5efc"/><stop offset="1" stop-color="#22b8cf"/>
        </linearGradient></defs>
      </svg>
    </span>
    <h1>TextHumanize</h1>
    <span class="pill offline" data-i18n="offlineBadge"></span>
    <span class="grow"></span>
    <button id="open-workspace" class="icon-btn" data-i18n-title="openWorkspace" title="">⤢</button>
    <button id="open-options" class="icon-btn" data-i18n-title="settings" title="">⚙</button>
  </header>

  <nav class="tabs" id="main-tabs">
    <button class="tab active" data-tab="text"><span>✍️</span><b data-i18n="tabText"></b></button>
    <button class="tab" data-tab="page"><span>🌐</span><b data-i18n="tabPage"></b></button>
    <button class="tab" data-tab="media"><span>🖼️</span><b data-i18n="tabMedia"></b></button>
  </nav>

  <!-- ── TEXT ── -->
  <main class="panel active" data-panel="text">
    <div class="input-wrap">
      <textarea id="input" data-i18n-placeholder="inputPlaceholder2" spellcheck="false"></textarea>
      <div class="input-meta">
        <span id="lang-badge" class="pill" hidden></span>
        <span id="count" class="dim"></span>
        <span class="grow"></span>
        <button id="paste-btn" class="mini" data-i18n="paste"></button>
        <button id="clear-btn" class="mini" data-i18n="clear" hidden></button>
      </div>
    </div>

    <button id="humanize-btn" class="cta" data-i18n="humanizeCta"></button>
    <div class="tool-row" id="tool-row"></div>

    <section id="result" class="result" hidden></section>
    <div id="busy" class="busy" hidden><span class="spinner"></span><span data-i18n="processing"></span></div>
  </main>

  <!-- ── PAGE ── -->
  <main class="panel" data-panel="page">
    <p class="lead dim" data-i18n="pageLead"></p>
    <button id="scan-page-btn" class="cta"><span data-i18n="scanPage"></span></button>
    <section id="page-result" class="result" hidden></section>
    <div id="page-busy" class="busy" hidden><span class="spinner"></span><span data-i18n="scanning"></span></div>
  </main>

  <!-- ── MEDIA ── -->
  <main class="panel" data-panel="media">
    <div id="drop" class="drop">
      <div class="drop-inner">
        <div class="drop-icon">🖼️</div>
        <b data-i18n="dropTitle"></b>
        <span class="dim" data-i18n="dropHint"></span>
        <input type="file" id="file-input" accept="image/*,audio/*,video/*" hidden>
        <button id="pick-btn" class="mini" data-i18n="choose"></button>
      </div>
    </div>
    <section id="media-result" class="result" hidden></section>
  </main>

  <footer class="foot">
    <a href="https://github.com/ksanyok/texthumanize-extension" target="_blank" rel="noopener" data-i18n="credit"></a>
  </footer>

  <script src="popup.js" type="module"></script>
</body>
</html>
